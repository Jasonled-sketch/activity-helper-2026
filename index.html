<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f5fa5" />
<title>活動強力助手2026</title>
<style>
  :root{
    --brand:#1f5fa5; --brand-d:#0c447c; --ink:#1c1c1a; --mut:#6b6a64; --hint:#9a988f;
    --line:#e6e4dc; --line2:#d2cfc4; --bg:#f6f5f0; --card:#ffffff;
    --A:#d85a30; --Abg:#faece7; --B:#0f6e56; --Bbg:#e1f5ee; --C:#3c3489; --Cbg:#eeedfe;
    --r:10px; --r-lg:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%; line-height:1.6;}
  button{font-family:inherit; cursor:pointer}
  input,select,textarea{font-family:inherit; font-size:15px; width:100%; padding:9px 11px;
    border:1px solid var(--line2); border-radius:8px; background:#fff; color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(31,95,165,.12)}
  textarea{resize:vertical; min-height:70px}
  .wrap{max-width:920px; margin:0 auto; padding:0 14px 90px}

  .top{position:sticky; top:0; z-index:30; background:var(--brand); color:#fff; padding:10px 14px;
    display:flex; align-items:center; gap:10px;}
  .top .logo{font-weight:700; font-size:15px; letter-spacing:.3px; white-space:nowrap}
  .top .logo small{font-weight:400; opacity:.8; font-size:11px; display:block; letter-spacing:0}
  .vbadge{font-weight:400; font-size:11px; opacity:.9; margin-left:7px; padding:1px 7px; border:1px solid rgba(255,255,255,.4); border-radius:10px; vertical-align:2px; white-space:nowrap}
  .top .sp{flex:1}
  .top select{width:auto; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.35);
    color:#fff; padding:6px 8px; font-size:13px; max-width:40vw}
  .top select option{color:#000}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg); padding:14px 16px; margin:12px 0}
  .btn{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line2); background:#fff; color:var(--ink);
    padding:9px 14px; border-radius:9px; font-size:14px; font-weight:500}
  .btn:active{transform:scale(.98)}
  .btn.pri{background:var(--brand); border-color:var(--brand); color:#fff}
  .btn.sm{padding:6px 10px; font-size:13px}
  .btn.gho{background:transparent; border-color:transparent; color:var(--brand); padding:6px 4px}
  .row{display:flex; align-items:center; gap:10px}
  .muted{color:var(--mut)} .hint{color:var(--hint); font-size:12px} .unset{color:#b9b7ae}
  h2{font-size:18px; margin:18px 2px 4px} h3{font-size:15px; margin:0}
  .pill{display:inline-block; font-size:12px; font-weight:600; padding:4px 11px; border-radius:20px; white-space:nowrap}
  .tag{display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px}
  .tag.w{background:var(--Abg); color:var(--A)} .tag.o{background:var(--Cbg); color:var(--C)}
  .sep{height:1px; background:var(--line); margin:14px 0}
  .crumb{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--mut); padding:12px 2px 0}
  .crumb b{color:var(--ink); font-weight:500}

  .evt{display:flex; align-items:center; gap:12px; cursor:pointer}
  .evt:hover{border-color:var(--line2)}
  .evt .dt{width:54px; text-align:center; border-right:1px solid var(--line); padding-right:12px; color:var(--brand)}
  .evt .dt .d{font-size:20px; font-weight:700; line-height:1} .evt .dt .m{font-size:11px; color:var(--mut)}
  .progbar{height:7px; background:#eceae3; border-radius:20px; overflow:hidden}
  .progbar>i{display:block; height:100%; background:var(--B); border-radius:20px}

  .phaserow{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:14px 0 8px}
  .phaserow div{text-align:center; font-size:13px; font-weight:600; padding:7px; border-radius:9px}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .cell{background:var(--card); border:1px solid var(--line); border-radius:11px; padding:10px 10px 9px;
    cursor:pointer; min-height:92px; display:flex; flex-direction:column}
  .cell:active{transform:scale(.98)}
  .cell .ch{display:flex; justify-content:space-between; align-items:center}
  .cell .code{font-size:11px; font-weight:700; color:var(--hint)}
  .dotbtn{width:18px; height:18px; border-radius:50%; flex:none; border:2px solid #fff; box-shadow:0 0 0 1px var(--line2); padding:0}
  .cell .nm{font-size:13.5px; font-weight:600; margin:6px 0 auto; line-height:1.25}
  .cell .ft{display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--mut); margin-top:7px}

  .legend{display:flex; flex-wrap:wrap; gap:6px 14px; font-size:12px; color:var(--mut); margin-top:12px}
  .legend span{display:inline-flex; align-items:center; gap:5px}
  .lgd{width:9px; height:9px; border-radius:50%}

  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .stat{background:var(--bg); border-radius:10px; padding:10px 12px}
  .stat .k{font-size:11px; color:var(--mut)} .stat .v{font-size:15px; font-weight:700; margin-top:2px}

  .grp{margin:16px 0 4px; font-size:13px; font-weight:600; color:var(--brand); display:flex; align-items:center; gap:7px}
  .grp::before{content:""; width:4px; height:14px; background:var(--brand); border-radius:2px}
  .fld{margin:11px 0}
  .fld label{display:block; font-size:13px; color:var(--ink); margin-bottom:5px; font-weight:500}
  .chips{display:flex; flex-wrap:wrap; gap:7px}
  .chk{display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line2); border-radius:20px;
    padding:6px 12px; font-size:13px; cursor:pointer; user-select:none; background:#fff}
  .chk input{width:auto; margin:0}
  .chk.on{border-color:var(--brand); background:#eef4fb; color:var(--brand-d)}

  /* 狀態：單一循環按鈕 */
  .stbtn{display:flex; align-items:center; gap:9px; width:100%; border:2px solid var(--line2); border-radius:10px;
    padding:13px 14px; font-size:15px; font-weight:600; background:#fff; color:var(--ink)}
  .stbtn .dot{width:14px; height:14px; border-radius:50%; flex:none}
  .stbtn .stnext{margin-left:auto; font-size:12px; color:var(--mut); font-weight:400}
  .stbtn.inline{width:auto; min-width:118px; padding:9px 13px; font-size:14px; height:38px}

  /* 預算逐項 */
  .qchip{font-size:12px; padding:5px 10px; border:1px solid var(--line2); border-radius:16px; background:#fff;
    color:var(--brand-d); margin:0 6px 6px 0}
  .qchip.cust{border-style:dashed; color:var(--mut)}
  .liquick{margin:2px 0 8px; line-height:2}
  .lirow{display:flex; gap:6px; align-items:center; margin:6px 0}
  .lirow input{padding:7px 8px; font-size:14px}
  .li-name{flex:2; min-width:0} .li-qty{width:48px; flex:none; text-align:center; padding-left:2px!important; padding-right:2px!important}
  .li-note{flex:1; min-width:0} .li-amt{width:86px; flex:none; text-align:right}
  .li-del{flex:none; width:30px; height:34px; padding:0; border:1px solid var(--line2); border-radius:8px; background:#fff; color:#e24b4a; font-size:13px}
  .lisum{text-align:right; font-size:13px; color:var(--ink); font-weight:600; margin-top:4px}

  .catToggle{display:flex; gap:8px; margin-top:4px}
  .cattab{flex:1; padding:12px; border:1.5px solid var(--line2); border-radius:10px; background:#fff; font-size:15px; font-weight:500; color:var(--ink)}
  .cattab.on{border-color:var(--brand); background:#eef4fb; color:var(--brand-d)}

  .savebar{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:10px 14px; display:flex; gap:10px; z-index:25}
  .savebar .wrap2{max-width:920px; margin:0 auto; width:100%; display:flex; gap:10px}

  .mask{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:50; display:flex; align-items:flex-end; justify-content:center}
  .modal{background:#fff; width:100%; max-width:920px; border-radius:16px 16px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); max-height:88vh; overflow:auto}
  @media(min-width:600px){ .mask{align-items:center} .modal{border-radius:16px} }
  .ver{text-align:center; color:var(--hint); font-size:11px; padding:18px 0 0}
  .badge2{font-size:11px; background:#fff4e0; color:#854f0b; border:1px solid #f3d8a0; padding:3px 8px; border-radius:6px}

  /* 預算速覽視覺化（儀表板） */
  .budblk{margin:2px 0}
  .budhead{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
  .budtitle{font-size:13px; font-weight:700; color:var(--mut)}
  .budbal{font-size:20px; font-weight:800}
  .bbar-row{display:flex; align-items:center; gap:9px; margin:7px 0}
  .bbar-lab{width:30px; flex:none; font-size:12px; color:var(--mut)}
  .bbar{flex:1; height:11px; background:#eceae3; border-radius:20px; overflow:hidden}
  .bbar>i{display:block; height:100%; border-radius:20px; transition:width .3s}
  .bbar-val{width:96px; flex:none; text-align:right; font-size:13px; font-weight:600}

  /* 今日作戰面板 */
  .warcard{background:linear-gradient(135deg,#0f6e56,#128a68); color:#fff; border-radius:14px; padding:15px 16px; margin:12px 0; box-shadow:0 6px 18px rgba(15,110,86,.28)}
  .warhd{font-size:12px; font-weight:700; letter-spacing:.8px; display:flex; align-items:center; gap:7px; opacity:.96}
  .warlive{animation:blink 1.1s infinite; font-size:11px}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .wartitle{font-size:20px; font-weight:800; margin:5px 0 3px}
  .warstat{font-size:13px; opacity:.97; margin-bottom:13px}
  .warbtns{display:flex; flex-wrap:wrap; gap:8px}
  .warbtn{flex:1 1 100%; justify-content:center; background:#fff; color:#0c7a5c; border:none; font-weight:800; padding:13px; font-size:15px}
  .warbtn2{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.45); font-weight:600}

  /* 多欄表格（收支逐項 / 感謝名單 / 時間流程） */
  .tbl{margin:3px 0 2px}
  .tbl-head{display:flex; gap:5px; align-items:center; font-size:10.5px; color:var(--mut); font-weight:600; padding:0 0 4px}
  .tbl-head .th{flex:1 1 0; min-width:0; padding:0 4px; text-align:center}
  .tbl-head .th-sub{flex:none; width:74px; padding:0}
  .tbl-head .th-h{flex:none; width:18px; padding:0}
  .tbl-head .th-b{flex:none; width:18px; padding:0}
  .trow{display:flex; gap:5px; align-items:flex-start; margin:4px 0}
  .cell-in{flex:1 1 0; min-width:0; padding:5px 7px; font-size:13px; text-align:center}
  .c-name,.c-who,.c-item,.c-content,.c-note,.c-sec,.c-spec,.c-support{text-align:left}
  .c-price{text-align:right}
  select.cell-in{padding:5px 2px}
  .trow input[type=number]{-moz-appearance:textfield}
  .trow input[type=number]::-webkit-inner-spin-button,.trow input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none; margin:0}
  .money-wrap{position:relative; display:flex; align-items:center}
  .msign{position:absolute; left:6px; font-size:11px; color:var(--mut); pointer-events:none}
  .money-wrap .cell-in{padding-left:15px}
  .c-sub{flex:none; width:74px; padding:5px 7px; font-size:12px; font-weight:600; color:var(--ink); border:1px solid var(--line); border-radius:8px; background:#faf9f4; text-align:right; min-height:30px; display:flex; align-items:center; justify-content:flex-end}
  .combo-wrap{position:relative; display:flex; align-items:flex-start}
  .combo-wrap .cell-in{padding-right:16px}
  .combo-btn{position:absolute; right:1px; top:3px; width:14px; height:22px; padding:0; border:none; background:transparent; color:var(--mut); font-size:9px; cursor:pointer}
  .combo-pop{position:absolute; top:100%; left:0; min-width:100%; max-height:180px; overflow:auto; background:#fff; border:1px solid var(--line2); border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,.14); z-index:40; margin-top:2px}
  .combo-opt{padding:7px 11px; font-size:13px; white-space:nowrap; cursor:pointer}
  .combo-opt:hover{background:#eef4fb}
  .combo-opt.picked{background:#eef4fb; font-weight:700}
  .combo-opt.picked::after{content:" ✓"; color:#0f6e56}
  .combo-empty{padding:7px 11px; font-size:12px; color:var(--hint)}
  .dragh{flex:none; width:18px; text-align:center; cursor:grab; color:var(--hint); font-size:13px; user-select:none}
  .dragh:active{cursor:grabbing}
  .rbtn{flex:none; width:18px; height:28px; padding:0; border:1px solid var(--line2); border-radius:6px; background:#fff; font-size:10px; color:var(--mut); line-height:1}
  .rbtn.on{border-color:var(--brand); background:#eef4fb}
  .rbtn.has{border-color:#1f5fa5; background:#1f5fa5; color:#fff}
  .rbtn.chkhas{border-color:#e24b4a; background:#e24b4a; color:#fff}
  .rbtn.del{color:#e24b4a}
  .cell-in.ta{resize:none; overflow:hidden; line-height:1.45; min-height:30px}
  .tbl-addbar{display:flex; gap:7px; flex-wrap:wrap}
  .addrow{margin:4px 0 2px; padding:6px 12px; border:1px dashed var(--line2); border-radius:9px; background:#fff; color:var(--brand-d); font-size:12.5px; font-weight:500}
  .addsec{border-color:#e8b84a; color:#9a6a00; background:#fffdf6}
  .tbl-foot{text-align:right; font-size:12.5px; font-weight:700; color:var(--ink); margin-top:5px}
  .trow-sec{background:#0f6e56; border:1px solid #0a5743; border-radius:9px; padding:2px 5px; margin:9px 0 4px}
  .trow-sec .c-sec{flex:1 1 0; min-width:0; font-weight:800; color:#fff; background:transparent; border:none; font-size:13.5px; padding:5px 6px}
  .trow-sec .c-sec::placeholder{color:rgba(255,255,255,.6)}
  .trow-sec .c-sec:focus{box-shadow:none}
  .trow-sec .dragh{color:rgba(255,255,255,.7)}
  .trow-sec .rbtn.del{color:#fff; border-color:rgba(255,255,255,.5); background:transparent}
  .rnote{display:flex; margin:1px 0 6px}
  .rnote-pad{flex:none}
  .rnote .c-note{font-size:12.5px}
  .rchecks{display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 8px}
  .chk.mini{padding:4px 10px; font-size:11.5px}
  .cdate-wrap{position:relative; display:flex; align-items:center; flex:none}
  .cdate-wrap .cdate{width:100%; padding-right:17px}
  .cdate-btn{position:absolute; right:0; width:17px; height:24px; padding:0; border:none; background:transparent; font-size:10px; line-height:1}
  .cdate-hidden{position:absolute; right:0; bottom:0; width:1px; height:1px; opacity:0; pointer-events:none}
  .time-wrap{position:relative; display:flex; align-items:stretch; flex:none}
  .time-wrap .c-time{width:100%; padding-right:15px}
  .time-spin{position:absolute; right:1px; top:1px; bottom:1px; display:flex; flex-direction:column; width:13px}
  .time-spin button{flex:1; border:none; background:transparent; padding:0; font-size:7px; line-height:1; color:var(--mut); cursor:pointer}
  .time-spin button:hover{color:var(--brand)}
  .pick-grid{display:flex; flex-wrap:wrap; gap:8px; max-height:48vh; overflow:auto; padding:2px}
  .pick-chip{border:1px solid var(--line2); background:#fff; border-radius:18px; padding:9px 15px; font-size:14px; cursor:pointer}
  .pick-chip.on{border-color:var(--brand); background:var(--brand); color:#fff; font-weight:600}
  .pick-sel{margin-top:12px; font-size:13px; color:var(--mut)}

  /* 人員名單 */
  .roster-chips{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px}
  .rchip{display:inline-flex; align-items:center; gap:3px; background:#eef4fb; color:var(--brand-d); border:1px solid #cfe0f3; border-radius:16px; padding:4px 7px 4px 11px; font-size:13px; cursor:pointer}
  .rchip-x{border:none; background:transparent; color:#90a4bd; font-size:15px; padding:0; width:16px; height:16px; line-height:1; cursor:pointer}
  .roster-add{display:flex; gap:6px}
  .roster-add input{flex:1}

  /* 可收合群組（點標題展開） */
  .grp-coll{width:100%; text-align:left; background:transparent; border:none; padding:0; cursor:pointer}
  .grp-caret{font-size:10px; color:var(--brand)}
  .grp-body{margin-bottom:4px}

  /* 登入閘門 + 唯讀模式 + 頂列身分 */
  .gate{position:fixed; inset:0; z-index:200; background:linear-gradient(135deg,#1f5fa5,#0c447c); display:flex; align-items:center; justify-content:center; padding:20px}
  .gatebox{background:#fff; border-radius:16px; padding:28px 24px; width:100%; max-width:380px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.35)}
  .gatetitle{font-size:20px; font-weight:800; color:var(--brand-d)}
  .gatesub{font-size:13px; color:var(--mut); margin:4px 0 20px}
  .gatebtn{width:100%; justify-content:center; padding:13px; font-size:15px}
  .gateor{color:var(--hint); font-size:12px; margin:16px 0}
  .gatepw{display:flex; gap:8px}
  .gatepw input{flex:1}
  .gateerr{color:#e24b4a; font-size:13px; margin-top:12px; min-height:18px}
  .top #authBox{display:flex; align-items:center; gap:7px}
  .top #authBox .meinfo{font-size:12px; opacity:.95; white-space:nowrap}
  .top #authBox button{background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4); color:#fff; padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer}
  body.viewonly .savebar{display:none}
  body.viewonly .btn.pri{display:none}
  body.viewonly .card input, body.viewonly .card textarea, body.viewonly .card select{pointer-events:none; background:#f3f2ee; color:#555}
  body.viewonly .dotbtn, body.viewonly .stbtn, body.viewonly .addrow, body.viewonly .rbtn, body.viewonly .dragh, body.viewonly .combo-btn, body.viewonly .cdate-btn, body.viewonly .time-spin, body.viewonly .qchip, body.viewonly .cattab{pointer-events:none; opacity:.45}

  /* ===== 手機版（≤640px）===== */
  @media (max-width:640px){
    /* 多欄表格：改成可左右滑動，欄位維持寬度不被壓扁 */
    .tbl{overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:3px}
    .tbl>.tbl-head, .tbl>.tbl-rows, .tbl>.tbl-addbar, .tbl>.tbl-foot{min-width:680px}
    .fld>label{font-size:12.5px}
    /* 頂列：縮小、允許換行，避免擠爆 */
    .top{flex-wrap:wrap; gap:6px 8px; padding:8px 12px}
    .top .logo{font-size:13px}
    .vbadge{display:none}
    .top select{max-width:36vw; font-size:12px; padding:5px 6px}
    .top #authBox{gap:5px}
    .top #authBox .meinfo{font-size:11px}
    .top #authBox button{padding:4px 7px; font-size:11px}
    /* 卡片/數字稍微縮，整體更好讀 */
    .wrap{padding:0 10px 90px}
    .card{padding:12px 12px}
    .stat{padding:8px 9px}
    .stat .v{font-size:13px}
    .budbal{font-size:17px}
    h2{font-size:16px}
    /* 活動列表日期欄縮一點 */
    .evt .dt{width:46px; padding-right:9px}
  }
</style>
</head>
<body>
<div class="top">
  <div class="logo" id="brandName">活動強力助手2026</div>
  <div class="sp"></div>
  <select id="orgSel" title="組織"></select>
  <span id="authBox"></span>
</div>
<div class="wrap" id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
/* ============================================================
   2026 活動智能管理工具  —  MVP (本機版 / localStorage)
   架構：schema-driven + 多組織(多租戶) → 模組化、可白標
   活動分「公益活動 / 組織活動」，自動切換顯示的欄位
   後續：接 Firebase(登入+授權名單+即時同步) → LINE 通知
   ============================================================ */
const APP_VERSION = 'v0.6.2';

/* 品牌設定：白標時只改這一塊 ------------------------------------ */
const BRAND = { name:'活動強力助手2026', primary:'#1f5fa5' };

/* 狀態燈號（規格 §6） ------------------------------------------- */
const STATUS = {
  not:    {label:'未開始', color:'#b4b2a9'},

const state = { view:'events', eventId:null, code:null };
function currentOrg(){ return DB.orgs.find(o=>o.id===DB.ui.orgId) || DB.orgs[0]; }
function orgEvents(){ const o=currentOrg(); return DB.events.filter(e=>e.orgId===o.id); }
function getEvent(id){ return DB.events.find(e=>e.id===id); }
function isWelfare(e){ return (e.category||'公益活動')==='公益活動'; }

function parseField(s){ const p=s.split('|'); return { label:p[0], type:p[1]||'text', options:p[2]?p[2].split(','):[], cat:p[3]||'' }; }
function moduleFields(code, welfare){
  const out=[]; SCHEMA[code].groups.forEach(gr=>{
    if(gr.cat==='welfare' && !welfare) return;
    gr.f.forEach(fs=>{ const f=parseField(fs); if(f.cat==='w'&&!welfare) return; out.push({...f, group:gr.g, key:gr.g+'::'+f.label}); });
  }); return out;
}
function computeProgress(code, values, welfare){
  const fs=moduleFields(code, welfare); if(!fs.length) return 0;
  let filled=0;
  fs.forEach(f=>{ const v=values[f.key];
    if(f.type==='multi'||f.type==='lineitems'||f.type==='table'||f.type==='roster'){ if(Array.isArray(v)&&v.length) filled++; }
    else if(f.type==='bool'){ if(v===true) filled++; }
    else if(v!==undefined && v!==null && String(v).trim()!=='') filled++;
  });
  return Math.round(100*filled/fs.length);
}
function rowSub(r){ if(!r) return 0; let p=parseFloat(r.price); if(isNaN(p)) p=parseFloat(r.amount); if(isNaN(p)) return 0; let q=parseFloat(r.qty); if(isNaN(q)||q<=0) q=1; return p*q; }
function sumLineItems(values, group){
  const arr=values[group+'::']; let s=0;
  if(Array.isArray(arr)) arr.forEach(r=>{ s+=rowSub(r); });
  return s;
}
function nt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayStr(){ const d=new Date(); const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }

function cycleStateBtn(id){ const b=document.getElementById(id); if(!b) return; const opts=(b.dataset.opts||'').split(',').filter(Boolean); if(!opts.length) return;
  let i=opts.indexOf(b.dataset.val); i=(i+1)%opts.length; const v=opts[i]; b.dataset.val=v; b.style.borderColor=stateColor(v); b.innerHTML=stateBtnInner(v); }

/* 預算即時結餘（A3 預估 / C1 實際 共用，純顯示，不動資料） */
function budgetLabels(c){ const gs=SCHEMA[c].groups; const inG=gs.find(g=>/收入/.test(g.g)); const outG=gs.find(g=>/支出/.test(g.g));
  const inL=inG?inG.g:'收入', outL=outG?outG.g:'支出'; const prefix=inL.replace('收入',''); return { in:inL, out:outL, bal:(prefix||'')+'結餘' }; }
function budgetTotals(){ let inc=0, exp=0; FIELD_META.forEach(f=>{ if(f.type!=='table') return;
    const def=TABLE_DEFS[f.defKey]; if(!def||!def.money) return; let s=0;
    document.querySelectorAll('#tblrows'+f.idx+' .trow').forEach(tr=>{ const pe=tr.querySelector('.c-price'), qe=tr.querySelector('.c-qty');
      const p=pe?parseFloat(pe.value):NaN; let q=qe?parseFloat(qe.value):NaN; if(isNaN(q)||q<=0) q=1; if(!isNaN(p)) s+=p*q; });
    if(/收入/.test(f.key)) inc+=s; else if(/支出/.test(f.key)) exp+=s; }); return { inc, exp, bal:inc-exp }; }
function budgetCardHTML(c){ const L=budgetLabels(c); return `<div class="card" id="budgetSum">
    <div class="stats">
      <div class="stat"><div class="k">${esc(L.in)}</div><div class="v" data-b="in">—</div></div>
      <div class="stat"><div class="k">${esc(L.out)}</div><div class="v" data-b="out">—</div></div>
      <div class="stat"><div class="k">${esc(L.bal)}</div><div class="v" data-b="bal" style="font-size:18px">—</div></div>
    </div>
    <p class="hint" style="margin:8px 0 0">邊填邊自動加總，結餘 = ${esc(L.in)} − ${esc(L.out)}。</p></div>`; }
function updateBudgetSummaryCard(){ const el=document.getElementById('budgetSum'); if(!el) return; const t=budgetTotals();
  const setv=(k,val,color)=>{ const x=el.querySelector('[data-b="'+k+'"]'); if(x){ x.textContent=nt(val); if(color) x.style.color=color; } };
  setv('in', t.inc); setv('out', t.exp); setv('bal', t.bal, t.bal<0?'#e24b4a':'#2fa36b'); }
function budgetBlock(title, inc, exp){ const bal=inc-exp, max=Math.max(inc,exp,1), bc=bal<0?'#e24b4a':'#2fa36b';
  return `<div class="budblk">
    <div class="budhead"><span class="budtitle">${esc(title)}</span><span class="budbal" style="color:${bc}">結餘 ${nt(bal)}</span></div>

    <div class="bbar-row"><span class="bbar-lab">支出</span><div class="bbar"><i style="width:${(exp/max*100).toFixed(1)}%;background:#e8884a"></i></div><span class="bbar-val">${nt(exp)}</span></div>

function fieldHTML(f, key, idx, val){

    return `<div class="fld">${lab}

      <div class="lisum" id="lisum${idx}"></div></div>`;
  }
  if(f.type==='table') return tableHTML(f, idx, val);
  if(f.type==='roster'){ const names=Array.isArray(val)?val:[];
    return `<div class="fld">${lab}<div class="roster">

    </div></div>`; }
  if(f.type==='area') return `<div class="fld">${lab}<textarea id="${id}">${esc(val||'')}</textarea></div>`;
  if(f.type==='num'||f.type==='money') return `<div class="fld">${lab}<input id="${id}" type="number" inputmode="decimal" value="${val!=null?esc(val):''}" placeholder="${f.type==='money'?'金額':''}"></div>`;
  if(f.type==='date') return `<div class="fld">${lab}<input id="${id}" type="date" value="${esc(val||'')}"></div>`;
  if(f.type==='photo') return `<div class="fld">${lab}<input id="${id}" value="${esc(val||'')}" placeholder="貼上照片/檔案連結（雲端硬碟）"></div>`;
  if(f.type==='bool') return `<div class="fld"><label class="chk ${val===true?'on':''}" id="${id}_w"><input type="checkbox" id="${id}" ${val===true?'checked':''} onchange="document.getElementById('${id}_w').classList.toggle('on',this.checked)"> ${esc(f.label)}</label></div>`;
  if(f.type==='statebtn') return `<div class="fld">${lab}<button type="button" class="stbtn" id="${id}" data-val="${esc(val||'')}" data-opts="${esc(f.options.join(','))}" style="border-color:${stateColor(val||'')}" onclick="cycleStateBtn('${id}')">${stateBtnInner(val||'')}</button></div>`;
  if(f.type==='select') return `<div class="fld">${lab}<select id="${id}"><option value="">— 請選擇 —</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
  if(f.type==='multi'){ const arr=Array.isArray(val)?val:[];
    return `<div class="fld">${lab}<div class="chips">${f.options.map(o=>`<label class="chk ${arr.includes(o)?'on':''}"><input type="checkbox" class="m${idx}" value="${esc(o)}" ${arr.includes(o)?'checked':''} onchange="this.closest('.chk').classList.toggle('on',this.checked)"> ${esc(o)}</label>`).join('')}</div></div>`; }
  return `<div class="fld">${lab}<input id="${id}" value="${esc(val||'')}"></div>`;
}

function liAdd(idx, name){

function liSum(idx){

/* ============================================================
   多欄表格（table）：渲染與互動
   ============================================================ */
function tableHTML(f, idx, val){
  const defKey=f.options[0]; const def=TABLE_DEFS[defKey]||{cols:[],money:false};
  const rows=Array.isArray(val)?val:[];
  let heads = def.reorder?`<span class="th th-h"></span>`:'';
  heads += def.cols.map(c=>`<span class="th"${c.w?` style="flex:none;width:${c.w}"`:(c.fg?` style="flex:${c.fg} 1 0;min-width:0"`:'')}>${esc(c.label)}</span>`).join('');
  if(def.money) heads += `<span class="th th-sub">小計</span>`;
  if(def.note) heads += `<span class="th th-b"></span>`;
  if(def.checks) heads += `<span class="th th-b"></span>`;
  heads += `<span class="th th-b"></span>`;

  return `<div class="fld">

      <div class="tbl-addbar"><button type="button" class="addrow" onclick="tableAddRow(${idx})">＋ 新增一列</button>${secBtn}</div>
      <div class="tbl-foot" id="tblfoot${idx}"></div>
    </div></div>`;
}
function cellStyle(col){ return col.w?` style="flex:none;width:${col.w}"` : (col.fg?` style="flex:${col.fg} 1 0;min-width:0"`:''); }
function tcell(idx, col, v){
  v = (v==null)?'':v; if(v==='' && col.def!=null) v=col.def;
  const base='cell-in c-'+col.k; const wsty=cellStyle(col);
  if(col.type==='md'){
    return `<span class="cdate-wrap"${col.w?` style="flex:none;width:${col.w}"`:''}>`
      +`<input class="${base} cdate" data-c="${col.k}" data-prev="${esc(v)}" value="${esc(v)}" placeholder="06/11" inputmode="numeric" onchange="dateCommit(this,${idx})">`
      +`<button type="button" class="cdate-btn" tabindex="-1" onclick="pickDate(this)">📅</button>`
      +`<input type="date" class="cdate-hidden" tabindex="-1" onchange="setDateCell(this)"></span>`;
  }
  if(col.type==='time') return `<span class="time-wrap"${wsty}><input class="${base} c-time" data-c="${col.k}" data-prev="${esc(v)}" value="${esc(v)}" placeholder="13:00" inputmode="numeric" maxlength="5" oninput="timeMask(this)" onchange="timeCommit(this,${idx})"><span class="time-spin"><button type="button" tabindex="-1" onclick="timeStep(this,1,${idx})">▲</button><button type="button" tabindex="-1" onclick="timeStep(this,-1,${idx})">▼</button></span></span>`;
  if(col.type==='area') return `<textarea class="${base} ta" data-c="${col.k}" rows="1" oninput="taGrow(this)" placeholder="${esc(col.label)}（Enter 換行＝條列）"${wsty}>${esc(v)}</textarea>`;
  if(col.type==='money') return `<span class="money-wrap"${wsty}><span class="msign">$</span><input class="${base}" data-c="${col.k}" type="number" inputmode="decimal" value="${esc(v)}" oninput="tableRecalc(${idx})"></span>`;
  if(col.type==='num') return `<input class="${base}" data-c="${col.k}" type="number" inputmode="numeric" value="${esc(v)}" oninput="tableRecalc(${idx})"${wsty}>`;
  if(col.type==='select') return `<select class="${base}" data-c="${col.k}"${wsty}><option value="">—</option>${col.opts.map(o=>`<option ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
  if(col.type==='combo'){
    if(col.roster){
      if(col.multi) return `<span class="combo-wrap"${wsty}><textarea class="${base} ta" data-c="${col.k}" data-roster="1" data-multi="1" rows="1" onfocus="_lastRosterCell=this" oninput="taGrow(this)" placeholder="${esc(col.label)}">${esc(v)}</textarea><button type="button" class="combo-btn" tabindex="-1" title="點選人員" onclick="openPeoplePicker(this)">👥</button></span>`;
      return `<span class="combo-wrap"${wsty}><input class="${base}" data-c="${col.k}" data-roster="1" onfocus="_lastRosterCell=this" value="${esc(v)}" placeholder="${esc(col.label)}"><button type="button" class="combo-btn" tabindex="-1" title="點選人員" onclick="openPeoplePicker(this)">👥</button></span>`; }
    const dop=` data-opts="${esc((col.opts||[]).join('||'))}"`;
    return `<span class="combo-wrap"${wsty}><input class="${base}" data-c="${col.k}"${dop} value="${esc(v)}" placeholder="${esc(col.label)}"><button type="button" class="combo-btn" tabindex="-1" onclick="comboOpen(this)">▾</button></span>`; }
  return `<input class="${base}" data-c="${col.k}" value="${esc(v)}" placeholder="${esc(col.label)}"${wsty}>`;
}
function tableRowHTML(idx, def, r){
  r=r||{};
  const handle=def.reorder?`<span class="dragh" draggable="true" ondragstart="rowDragStart(event,this)" ondragend="rowDragEnd(event)" title="拖曳排序">⠿</span>`:'';
  if(r.sec!=null){
    return `<div class="trow-wrap" ondragover="rowDragOver(event)" ondrop="rowDrop(event)"><div class="trow trow-sec">${handle}<input class="cell-in c-sec" data-c="sec" value="${esc(r.sec)}" placeholder="分段重要主題（顯眼標示）…"><button type="button" class="rbtn del" title="刪除" onclick="tableDelRow(this,${idx})">✕</button></div></div>`;
  }
  const cells=def.cols.map(c=>tcell(idx,c,r[c.k])).join('');
  const subCell=def.money?`<span class="c-sub" data-sub></span>`:'';
  const hasNote=def.note && r.note && String(r.note).trim()!=='';
  const hasChk=def.checks && r.checks && def.checks.some(n=>r.checks[n]);
  const noteBtn=def.note?`<button type="button" class="rbtn${hasNote?' has':''}" title="備註" onclick="toggleRowExtra(this,'note')">📝</button>`:'';
  const chkBtn=def.checks?`<button type="button" class="rbtn${hasChk?' chkhas':''}" title="勾選" onclick="toggleRowExtra(this,'checks')">☑</button>`:'';
  const delBtn=`<button type="button" class="rbtn del" title="刪除" onclick="tableDelRow(this,${idx})">✕</button>`;
  const leadW=(def.reorder?23:0)+(parseInt(def.cols[0].w)||0)+5;
  const rightW=(def.money?79:0)+(def.note?23:0)+(def.checks?23:0)+23;
  const noteRow=def.note?`<div class="rnote" style="display:none"><span class="rnote-pad" style="width:${leadW}px"></span><input class="cell-in c-note" oninput="noteContentChanged(this)" value="${esc(r.note||'')}" placeholder="備註…"><span class="rnote-pad" style="width:${rightW}px"></span></div>`:'';
  let chkRow='';
  if(def.checks){ const ch=r.checks||{};
    chkRow=`<div class="rchecks" style="display:none">${def.checks.map(n=>`<label class="chk mini ${ch[n]?'on':''}"><input type="checkbox" data-chk="${esc(n)}" ${ch[n]?'checked':''} onchange="chkChanged(this)"> ${esc(n)}</label>`).join('')}</div>`; }
  return `<div class="trow-wrap" ondragover="rowDragOver(event)" ondrop="rowDrop(event)"><div class="trow">${handle}${cells}${subCell}${noteBtn}${chkBtn}${delBtn}</div>${noteRow}${chkRow}</div>`;
}
function tableAddRow(idx){
  const t=document.getElementById('tbl'+idx); if(!t) return; const def=TABLE_DEFS[t.dataset.def]||{cols:[]};
  const box=document.getElementById('tblrows'+idx);
  box.insertAdjacentHTML('beforeend', tableRowHTML(idx,def,{}));
  tableRecalc(idx);
  const rows=box.querySelectorAll('.trow-wrap'); const last=rows[rows.length-1].querySelector('.cell-in'); if(last) last.focus();
}
function tableDelRow(btn, idx){ const w=btn.closest('.trow-wrap'); if(w) w.remove(); tableRecalc(idx); }
function toggleRowExtra(btn, kind){
  const w=btn.closest('.trow-wrap'); const el=w.querySelector(kind==='note'?'.rnote':'.rchecks'); if(!el) return;
  const show=el.style.display==='none'; el.style.display=show?'':'none';
  if(show){ const inp=el.querySelector('input'); if(inp&&inp.type!=='checkbox') inp.focus(); }
}
function tableRecalc(idx){
  const t=document.getElementById('tbl'+idx); if(!t) return; const def=TABLE_DEFS[t.dataset.def]||{};
  const rows=document.querySelectorAll('#tblrows'+idx+' .trow-wrap'); let total=0, n=0;
  rows.forEach(w=>{ if(w.querySelector('.c-sec')) return; n++; const tr=w.querySelector('.trow');
    if(def.money){ const pe=tr.querySelector('.c-price'), qe=tr.querySelector('.c-qty');
      const p=pe?parseFloat(pe.value):NaN; let q=qe?parseFloat(qe.value):NaN; if(isNaN(q)||q<=0) q=1;
      const sub=isNaN(p)?NaN:p*q; const sc=tr.querySelector('[data-sub]'); if(sc) sc.textContent=isNaN(sub)?'':nt(sub);
      if(!isNaN(sub)) total+=sub; }
  });
  const foot=document.getElementById('tblfoot'+idx);
  if(foot) foot.textContent = def.money ? ('共 '+n+' 列　小計 '+nt(total)) : ('共 '+n+' 列');
  document.querySelectorAll('#tblrows'+idx+' .ta').forEach(taGrow);
  updateBudgetSummaryCard();
}
function pickDate(btn){ const h=btn.parentElement.querySelector('.cdate-hidden'); if(!h) return; if(h.showPicker){ try{ h.showPicker(); }catch(e){ h.click(); } } else h.click(); }
function setDateCell(dp){ const w=dp.closest('.cdate-wrap'); const t=w.querySelector('.cdate'); if(dp.value){ const p=dp.value.split('-'); t.value=p[1]+'/'+p[2]; t.dataset.prev=t.value; } const tb=dp.closest('.tbl'); if(tb) tableSort(tb.id.slice(3)); }
function toggleGroup(btn){ const b=btn.nextElementSibling; if(!b) return; const open=b.style.display!=='none'; b.style.display=open?'none':''; const c=btn.querySelector('.grp-caret'); if(c) c.textContent=open?'▸':'▾'; }

/* 人員名單（roster）＋ 拖曳排序 */
function rchipHTML(n){ return `<span class="rchip" onclick="rosterPick(this)" title="點我填入剛選的格子"><span class="rchip-n">${esc(n)}</span><button type="button" class="rchip-x" onclick="event.stopPropagation();rosterDel(this)" title="移除">×</button></span>`; }
function rosterNames(){ return [...document.querySelectorAll('#rosterChips .rchip-n')].map(s=>s.textContent); }
function rosterSync(){ const opts=rosterNames().map(n=>`<option value="${esc(n)}"></option>`).join(''); document.querySelectorAll('datalist.dl-roster').forEach(dl=>dl.innerHTML=opts); }
function rosterAdd(){ const inp=document.getElementById('rosterInput'); if(!inp) return; const v=inp.value.trim(); if(!v) return; if(rosterNames().indexOf(v)<0) document.getElementById('rosterChips').insertAdjacentHTML('beforeend', rchipHTML(v)); inp.value=''; inp.focus(); rosterSync(); }
function rosterDel(btn){ const c=btn.closest('.rchip'); if(c) c.remove(); rosterSync(); }
function rosterPick(chip){ if(!_lastRosterCell) return; const n=chip.querySelector('.rchip-n').textContent;
  if(_lastRosterCell.dataset.multi){ let cur=_lastRosterCell.value.split('、').map(s=>s.trim()).filter(Boolean); if(cur.indexOf(n)<0) cur.push(n); _lastRosterCell.value=cur.join('、'); }
  else _lastRosterCell.value=n;
  _lastRosterCell.dispatchEvent(new Event('input',{bubbles:true})); _lastRosterCell.focus(); }
function rowDragStart(e,h){ _dragRow=h.closest('.trow-wrap'); e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain',''); }catch(_){} }
function rowDragOver(e){ if(_dragRow) e.preventDefault(); }
function rowDrop(e){ if(!_dragRow) return; e.preventDefault(); const tgt=e.currentTarget; if(tgt===_dragRow) return; const box=tgt.parentNode; const rc=tgt.getBoundingClientRect(); const after=(e.clientY-rc.top)>rc.height/2; box.insertBefore(_dragRow, after?tgt.nextSibling:tgt); }
function rowDragEnd(){ _dragRow=null; }

/* 自製下拉（解決 datalist 選一次後無法再選的 bug；可重複開、可自行打字） */
let _openCombo=null;
function closeCombo(){ if(_openCombo){ _openCombo.remove(); _openCombo=null; } }
function comboOpen(btn){
  const wrap=btn.parentElement; const inp=wrap.querySelector('input');
  if(_openCombo && _openCombo.parentElement===wrap){ closeCombo(); return; }
  closeCombo();
  const opts = inp.dataset.roster ? rosterNames() : (inp.dataset.opts? inp.dataset.opts.split('||').filter(Boolean) : []);
  const multi = !!inp.dataset.multi;
  const sel = multi ? inp.value.split('、').map(s=>s.trim()).filter(Boolean) : [];
  const pop=document.createElement('div'); pop.className='combo-pop';
  if(multi){ const h=document.createElement('div'); h.className='combo-empty'; h.textContent='可複選（點名字加入/移除，點空白處關閉）'; pop.appendChild(h); }
  if(!opts.length){ const d=document.createElement('div'); d.className='combo-empty'; d.textContent='（先在上方人員名單加入，或自行輸入）'; pop.appendChild(d); }
  else opts.forEach(o=>{ const d=document.createElement('div'); d.className='combo-opt'+(sel.indexOf(o)>=0?' picked':''); d.textContent=o;
    d.onmousedown=function(ev){ ev.preventDefault();
      if(multi){ let cur=inp.value.split('、').map(s=>s.trim()).filter(Boolean); const i=cur.indexOf(o); if(i>=0) cur.splice(i,1); else cur.push(o); inp.value=cur.join('、'); inp.dispatchEvent(new Event('input',{bubbles:true})); d.classList.toggle('picked'); }
      else { inp.value=o; inp.dispatchEvent(new Event('input',{bubbles:true})); closeCombo(); } };
    pop.appendChild(d); });
  wrap.appendChild(pop); _openCombo=pop;
}
document.addEventListener('mousedown', function(e){ if(_openCombo && !_openCombo.parentElement.contains(e.target)) closeCombo(); });

/* 時間遮罩：只允許 時:分（HH:MM） */
function timeMask(el){ let d=el.value.replace(/[^0-9]/g,'').slice(0,4); el.value = (d.length>=3)? (d.slice(0,2)+':'+d.slice(2)) : d; }

/* 備註有內容 → 📝 變黃；勾選有打勾 → ☑ 亮起 */
function noteContentChanged(inp){ const w=inp.closest('.trow-wrap'); const b=w.querySelector('.rbtn[title=備註]'); if(b) b.classList.toggle('has', inp.value.trim()!==''); }
function chkChanged(cb){ cb.closest('.chk').classList.toggle('on',cb.checked); const w=cb.closest('.trow-wrap'); const b=w.querySelector('.rbtn[title=勾選]'); if(b) b.classList.toggle('chkhas', w.querySelectorAll('.rchecks input:checked').length>0); }
function taGrow(el){ if(!el) return; el.style.height='auto'; el.style.height=(el.scrollHeight)+'px'; }

/* 時間：上下鈕(±5分)、24時/60分驗證(99:99 跳回原值)、依時間自動排序 */
function tmin(v){ const m=/^(\d{1,2}):(\d{2})$/.exec(v||''); return m?(+m[1])*60+(+m[2]):99999; }
function dnum(v){ const m=/^(\d{1,2})\/(\d{1,2})$/.exec(v||''); return m?(+m[1])*100+(+m[2]):99999; }
function timeStep(btn,dir,idx){ const inp=btn.closest('.time-wrap').querySelector('.c-time'); let m=tmin(inp.value); if(m>=99999) m=0; m=((m+dir*5)%1440+1440)%1440; inp.value=String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); inp.dataset.prev=inp.value; tableSort(idx); }
function timeCommit(inp,idx){ const m=/^(\d{1,2}):(\d{2})$/.exec(inp.value); if(!inp.value){ inp.dataset.prev=''; } else if(m && +m[1]<=23 && +m[2]<=59){ inp.value=String(+m[1]).padStart(2,'0')+':'+m[2]; inp.dataset.prev=inp.value; } else { inp.value=inp.dataset.prev||''; } tableSort(idx); }
function dateCommit(inp,idx){ const m=/^(\d{1,2})\/(\d{1,2})$/.exec(inp.value); if(inp.value && (!m || +m[1]>12 || +m[1]<1 || +m[2]>31 || +m[2]<1)){ inp.value=inp.dataset.prev||''; } else { inp.dataset.prev=inp.value; } tableSort(idx); }
function tableSort(idx){ const t=document.getElementById('tbl'+idx); if(!t) return; const def=TABLE_DEFS[t.dataset.def]||{}; const box=document.getElementById('tblrows'+idx); if(!box) return;
  const isTime = def.cols && def.cols.some(c=>c.type==='time');
  const keyOf=(w)=>{ const tr=w.querySelector('.trow'); if(isTime){ const e=tr.querySelector('.c-time'); return tmin(e?e.value:''); } const e=tr.querySelector('.c-date'); return dnum(e?e.value:''); };
  const wraps=[...box.children];
  if(def.sections){ let i=0; const out=[]; while(i<wraps.length){ if(wraps[i].querySelector('.c-sec')){ out.push(wraps[i]); i++; continue; } const seg=[]; while(i<wraps.length && !wraps[i].querySelector('.c-sec')){ seg.push(wraps[i]); i++; } seg.sort((a,b)=>keyOf(a)-keyOf(b)); out.push.apply(out,seg); } out.forEach(w=>box.appendChild(w)); }
  else { wraps.sort((a,b)=>keyOf(a)-keyOf(b)); wraps.forEach(w=>box.appendChild(w)); }
}

/* 場控者／支援人員：點開彈窗選人（適合 50-60 人，含搜尋；支援人員可複選） */
let _pickInput=null, _pickMulti=false;

  const names=rosterNames(); const sel=inp.value.split('、').map(s=>s.trim()).filter(Boolean);

function pickName(b){ const n=b.dataset.n; if(!_pickInput) return;
  if(_pickMulti){ let cur=_pickInput.value.split('、').map(s=>s.trim()).filter(Boolean); const i=cur.indexOf(n); if(i>=0) cur.splice(i,1); else cur.push(n); _pickInput.value=cur.join('、'); _pickInput.dispatchEvent(new Event('input',{bubbles:true})); b.classList.toggle('on'); const ps=document.getElementById('pickSel'); if(ps) ps.innerHTML='已選：<b>'+esc(cur.join('、')||'—')+'</b>'; }

/* 分段標題列（流程中插入顯眼關鍵主題） */
function tableAddSection(idx){ const t=document.getElementById('tbl'+idx); if(!t) return; const box=document.getElementById('tblrows'+idx);
  box.insertAdjacentHTML('beforeend', tableRowHTML(idx, TABLE_DEFS[t.dataset.def], {sec:''})); tableRecalc(idx);
  const rows=box.querySelectorAll('.trow-wrap'); const last=rows[rows.length-1].querySelector('.c-sec'); if(last) last.focus(); }

function saveModule(){
  if(!CAN_EDIT) return toast('觀看模式，無法編輯');
  const e=getEvent(state.eventId); const c=state.code; const m=e.modules[c];
  const values={...m.values};
  FIELD_META.forEach(f=>{
    if(f.type==='lineitems'){
      const arr=[]; document.querySelectorAll('#li'+f.idx+' .lirow').forEach(row=>{
        const name=row.querySelector('.li-name').value.trim(), qty=row.querySelector('.li-qty').value.trim(),
          note=row.querySelector('.li-note').value.trim(), amount=row.querySelector('.li-amt').value.trim();
        if(name||qty||note||amount) arr.push({name,qty,note,amount});
      });
      if(arr.length) values[f.key]=arr; else delete values[f.key];
    }
    else if(f.type==='table'){
      const def=TABLE_DEFS[f.defKey]||{cols:[]}; const arr=[];
      document.querySelectorAll('#tblrows'+f.idx+' .trow-wrap').forEach(wrp=>{
        const secEl=wrp.querySelector('.c-sec');
        if(secEl){ const sv=secEl.value.trim(); if(sv) arr.push({sec:sv}); return; }
        const tr=wrp.querySelector('.trow'); const row={}; let any=false;
        def.cols.forEach(col=>{ const el=tr.querySelector('[data-c="'+col.k+'"]'); const v=el?el.value.trim():''; if(v && v!==col.def){ row[col.k]=v; any=true; } });
        if(def.note){ const ne=wrp.querySelector('.c-note'); const nv=ne?ne.value.trim():''; if(nv){ row.note=nv; any=true; } }
        if(def.checks){ const ch={}; let has=false; wrp.querySelectorAll('.rchecks input[type=checkbox]').forEach(cb=>{ if(cb.checked){ ch[cb.dataset.chk]=true; has=true; } }); if(has){ row.checks=ch; any=true; } }
        if(any) arr.push(row);
      });
      if(arr.length) values[f.key]=arr; else delete values[f.key];
    }
    else if(f.type==='roster'){ const a=[...document.querySelectorAll('#rosterChips .rchip-n')].map(s=>s.textContent.trim()).filter(Boolean); if(a.length) values[f.key]=a; else delete values[f.key]; }
    else if(f.type==='multi'){ const a=[...document.querySelectorAll('.m'+f.idx+':checked')].map(x=>x.value); if(a.length) values[f.key]=a; else delete values[f.key]; }
    else if(f.type==='bool'){ if(document.getElementById('fld'+f.idx).checked) values[f.key]=true; else delete values[f.key]; }
    else if(f.type==='statebtn'){ const el=document.getElementById('fld'+f.idx); const v=el?el.dataset.val:''; if(v) values[f.key]=v; else delete values[f.key]; }
    else { const el=document.getElementById('fld'+f.idx); const v=el?el.value:''; if(v!==''&&v!=null) values[f.key]=v; else delete values[f.key]; }
  });
  m.values=values; m.owner=document.getElementById('ownerInput').value.trim();
  if(_pickStatus) m.status=_pickStatus;
  save(); toast('已儲存 '+c+' '+SCHEMA[c].title); openEvent(e.id);
}

let _efCat='公益活動', _efType='';

function editEvent(id){ if(!CAN_EDIT) return toast('觀看模式，無法編輯'); eventForm(getEvent(id)); }

    <div class="fld"><label>活動性質</label>
      <div class="catToggle" id="catToggle">
        ${CATEGORIES.map(c=>`<button type="button" class="cattab" data-cat="${c}" onclick="efSetCat('${c}')">${c}</button>`).join('')}
      </div>
      <p class="hint" style="margin:8px 0 0">公益活動會多顯示「公益專屬」欄位（服務對象、志工、成果…）；組織活動只顯示內部欄位。</p>
    </div>
    <div class="fld"><label>活動名稱</label><input id="ef_name" value="${esc(ev.name||'')}" placeholder="例：淨灘公益服務 2026"></div>
    <div class="fld"><label>活動類型</label><select id="ef_type"></select></div>
    <div class="row" style="gap:10px">
      <div class="fld" style="flex:1"><label>日期</label><input id="ef_date" type="date" value="${esc(ev.date||'')}"></div>
      <div class="fld" style="flex:1"><label>地點</label><input id="ef_place" value="${esc(ev.place||'')}"></div>
    </div>
    <div class="fld"><label>總召</label><input id="ef_lead" value="${esc(ev.lead||'')}"></div>
    <div class="row" style="gap:10px; margin-top:8px">
      ${!isNew?`<button class="btn sm" style="color:#e24b4a;border-color:#f0c2c2" onclick="delEvent('${ev.id}')">刪除</button>`:''}
      <div style="flex:1"></div>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn pri" onclick="saveEvent('${isNew?'':ev.id}')">儲存</button>
    </div>`);
  efSetCat(_efCat);
}
function efSetCat(cat){
  _efCat=cat;
  document.querySelectorAll('#catToggle .cattab').forEach(b=> b.classList.toggle('on', b.dataset.cat===cat));
  const sel=document.getElementById('ef_type'); const want=sel.value||_efType||'';
  sel.innerHTML=TYPES[cat].map(t=>`<option ${t===want?'selected':''}>${esc(t)}</option>`).join('');
}
function saveEvent(id){
  const get=x=>document.getElementById(x).value.trim();
  const name=get('ef_name'); if(!name){ alert('請輸入活動名稱'); return; }
  const data={name, category:_efCat, type:get('ef_type'), date:get('ef_date'), place:get('ef_place'), lead:get('ef_lead')};
  if(id){ Object.assign(getEvent(id), data); save(); closeModal(); render(); }
  else { const e={id:uid(), orgId:currentOrg().id, modules:blankModules(), ...data}; DB.events.push(e); save(); closeModal(); openEvent(e.id); }
}
function delEvent(id){
  if(!confirm('確定刪除這個活動？此動作無法復原。')) return;
  DB.events=DB.events.filter(e=>e.id!==id); save(); closeModal(); goEvents();
}

document.getElementById('orgSel').addEventListener('change', function(){
  if(this.value==='__new'){ const n=prompt('新組織名稱：'); if(n&&n.trim()){ const o={id:uid(),name:n.trim()}; DB.orgs.push(o); DB.ui.orgId=o.id; save(); } goEvents(); return; }
  DB.ui.orgId=this.value; save(); goEvents();
});

function exportDB(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='活動管理-備份.json'; a.click();
}
function importDB(){
  const i=document.createElement('input'); i.type='file'; i.accept='application/json';
  i.onchange=()=>{ const f=i.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.orgs&&d.events){ DB=d; save(); goEvents(); toast('已匯入'); } else alert('檔案格式不符'); }catch(e){ alert('讀取失敗'); } };
    r.readAsText(f); };
  i.click();
}

function modal(html){
  closeModal();
  const m=document.createElement('div'); m.className='mask'; m.id='mask';
  m.onclick=e=>{ if(e.target===m) closeModal(); };
  m.innerHTML=`<div class="modal">${html}</div>`;
  document.body.appendChild(m);
}
function closeModal(){ const m=document.getElementById('mask'); if(m) m.remove(); }
function toast(t){
  const d=document.createElement('div'); d.textContent=t;
  d.style.cssText='position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#1c1c1a;color:#fff;padding:10px 18px;border-radius:24px;font-size:14px;z-index:99;opacity:0;transition:opacity .2s';
  document.body.appendChild(d); requestAnimationFrame(()=>d.style.opacity='1');
  setTimeout(()=>{ d.style.opacity='0'; setTimeout(()=>d.remove(),250); },1600);
}

/* ============================================================
   匯出 PDF（B2 當日時間流程 / C1 實支開銷）：點才載入 html2pdf
   ============================================================ */
function ensureHtml2pdf(cb){
  if(window.html2pdf){ cb(); return; }
  toast('PDF 產生中…');
  var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js';
  s.onload=function(){ cb(); }; s.onerror=function(){ toast('PDF 元件載入失敗，請檢查網路'); };
  document.head.appendChild(s);
}
function pdfMoney(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function pcell(w){ return 'border:1px solid #e0ddd4;padding:6px 8px;vertical-align:top;'+(w?('width:'+w+';'):''); }
function pdfHead(e){
  return '<div style="border-bottom:2px solid #1f5fa5;padding-bottom:10px;margin-bottom:14px">'
    +'<div style="font-size:20px;font-weight:800;color:#0c447c">'+esc(e.name||'')+'</div>'
    +'<div style="font-size:12px;color:#555;margin-top:4px">'+esc(e.type||'')+'　日期 '+esc(e.date||'-')+'　地點 '+esc(e.place||'-')+'　總召 '+esc(e.lead||'-')+'</div></div>';
}
function pdfRundown(e){
  var rows=(e.modules.B2.values['當日時間流程::']||[]), body='';
  rows.forEach(function(r){
    if(r.sec!=null){ body+='<tr><td colspan="5" style="background:#0f6e56;color:#fff;font-weight:800;padding:7px 9px;font-size:13.5px">'+esc(r.sec)+'</td></tr>'; return; }
    body+='<tr>'
      +'<td style="'+pcell('64px')+'text-align:center">'+esc(r.time||'')+'</td>'
      +'<td style="'+pcell('108px')+'font-weight:600">'+esc(r.topic||'')+'</td>'
      +'<td style="'+pcell('')+'">'+esc(r.content||'').replace(/\n/g,'<br>')+'</td>'
      +'<td style="'+pcell('92px')+'">'+esc(r.owner||'')+'</td>'
      +'<td style="'+pcell('108px')+'">'+esc(r.support||'')+'</td></tr>';
  });
  return pdfHead(e)
    +'<div style="font-size:15px;font-weight:800;margin:0 0 8px;color:#0f6e56">當日時間流程</div>'
    +'<table style="width:100%;border-collapse:collapse;font-size:12px">'
    +'<thead><tr>'+['時間','主題','內容','場控者','支援人員'].map(function(h){return '<th style="background:#eef4fb;border:1px solid #d2cfc4;padding:6px 8px;text-align:left;font-size:11px">'+h+'</th>';}).join('')+'</tr></thead>'
    +'<tbody>'+body+'</tbody></table>'
    +'<div style="margin-top:14px;font-size:10px;color:#999;text-align:right">由 活動強力助手2026 產出 · '+todayStr()+'</div>';
}
function pdfBudget(e){
  var v=e.modules.C1.values;
  function sect(title,rows,catKey,color){
    var body='', sum=0;
    (rows||[]).forEach(function(r){
      var p=parseFloat(r.price), q=parseFloat(r.qty); if(isNaN(q)||q<=0)q=1; var sub=isNaN(p)?0:p*q; sum+=sub;
      body+='<tr>'
        +'<td style="'+pcell('50px')+'text-align:center">'+esc(r.date||'')+'</td>'
        +'<td style="'+pcell('78px')+'">'+esc(r[catKey]||'')+'</td>'
        +'<td style="'+pcell('')+'">'+esc(r.name||'')+'</td>'
        +'<td style="'+pcell('108px')+'color:#666">'+esc(r.spec||'')+'</td>'
        +'<td style="'+pcell('62px')+'text-align:right">'+(isNaN(p)?'':pdfMoney(p))+'</td>'
        +'<td style="'+pcell('38px')+'text-align:center">'+esc(r.qty||'1')+'</td>'
        +'<td style="'+pcell('70px')+'text-align:right;font-weight:600">'+(isNaN(p)?'':pdfMoney(sub))+'</td></tr>';
    });
    return '<div style="font-size:14px;font-weight:800;margin:14px 0 6px;color:'+color+'">'+title+'</div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:11.5px">'
      +'<thead><tr>'+['日期','項目','名稱','規格','金額','數量','小計'].map(function(h){return '<th style="background:#f3f2ee;border:1px solid #d2cfc4;padding:5px 7px;text-align:left;font-size:10.5px">'+h+'</th>';}).join('')+'</tr></thead>'
      +'<tbody>'+body+'</tbody>'
      +'<tfoot><tr><td colspan="6" style="'+pcell('')+'text-align:right;font-weight:700">合計</td><td style="'+pcell('70px')+'text-align:right;font-weight:800">'+pdfMoney(sum)+'</td></tr></tfoot></table>';
  }
  var inSum=sumLineItems(v,'實際收入'), outSum=sumLineItems(v,'實際支出'), bal=inSum-outSum;
  return pdfHead(e)
    +'<div style="font-size:15px;font-weight:800;color:#3c3489">實支開銷</div>'
    +sect('實際收入', v['實際收入::'], 'src', '#2fa36b')
    +sect('實際支出', v['實際支出::'], 'cat', '#d85a30')
    +'<div style="margin-top:14px;display:flex;gap:10px">'
      +'<div style="flex:1;background:#e1f5ee;border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#555">實際收入</div><div style="font-size:16px;font-weight:800">'+pdfMoney(inSum)+'</div></div>'
      +'<div style="flex:1;background:#faece7;border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#555">實際支出</div><div style="font-size:16px;font-weight:800">'+pdfMoney(outSum)+'</div></div>'
      +'<div style="flex:1;background:#eef4fb;border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:#555">結餘</div><div style="font-size:16px;font-weight:800;color:'+(bal<0?'#e24b4a':'#2fa36b')+'">'+pdfMoney(bal)+'</div></div>'
    +'</div>'
    +'<div style="margin-top:14px;font-size:10px;color:#999;text-align:right">由 活動強力助手2026 產出 · '+todayStr()+'</div>';
}
function exportPDF(){
  var e=getEvent(state.eventId), c=state.code; if(!e) return;
  var html, fname;
  if(c==='B2'){ html=pdfRundown(e); fname=(e.name||'活動')+'_當日時間流程.pdf'; }
  else if(c==='C1'){ html=pdfBudget(e); fname=(e.name||'活動')+'_實支開銷.pdf'; }
  else return;
  var wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-99999px;top:0;width:760px;padding:28px;background:#fff;font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;color:#1c1c1a;box-sizing:border-box';
  wrap.innerHTML='<style>tr{page-break-inside:avoid}</style>'+html;
  document.body.appendChild(wrap);
  ensureHtml2pdf(function(){
    html2pdf().set({ margin:[8,8,10,8], filename:fname, image:{type:'jpeg',quality:0.96}, html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}, pagebreak:{mode:['css','legacy']} })
      .from(wrap).save().then(function(){ wrap.remove(); }).catch(function(){ wrap.remove(); toast('PDF 產生失敗'); });
  });
}

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBK5elnV3BtWnJfQXazV3P5ucmhxVLPWEo",
  authDomain: "activity-helper-2026.firebaseapp.com",
  projectId: "activity-helper-2026",
  storageBucket: "activity-helper-2026.firebasestorage.app",
  messagingSenderId: "134028924830",
  appId: "1:134028924830:web:f29f4b3685a07c587ae88f"
};
const ADMIN_EMAIL = 'covernself@gmail.com';
const VIEW_PASSWORD = '131419';
let FB=null, CAN_EDIT=false, IS_ADMIN=false, CURRENT_USER='', _dataStarted=false, _firstSnap=false;

function boot(){
  if(location.protocol==='file:' || typeof firebase==='undefined'){ localMode(); return; }
  try{ firebase.initializeApp(FIREBASE_CONFIG); FB={auth:firebase.auth(), db:firebase.firestore()}; }
  catch(e){ console.warn('Firebase init fail',e); localMode(); return; }
  showGate();
  FB.auth.onAuthStateChanged(function(user){ if(user) onSignedIn(user); });
}
function localMode(){ DB=load(); CAN_EDIT=true; IS_ADMIN=false; CURRENT_USER='本機'; document.body.classList.remove('viewonly'); render(); }

function googleLogin(){ if(!FB) return; FB.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e){ var el=document.getElementById('gateErr'); if(el) el.textContent='登入失敗：'+(e.code||e.message||''); }); }
function enterViewer(){ var i=document.getElementById('gatePw'); if(!i) return; if((i.value||'').trim()!==VIEW_PASSWORD){ var e=document.getElementById('gateErr'); if(e) e.textContent='密碼不正確'; return; } CURRENT_USER='訪客（觀看）'; IS_ADMIN=false; CAN_EDIT=false; afterAuth(); }
function onSignedIn(user){
  var email=(user.email||'').toLowerCase(); CURRENT_USER=user.email||'';
  if(email===ADMIN_EMAIL){ IS_ADMIN=true; CAN_EDIT=true; afterAuth(); return; }
  FB.db.collection('access').doc(email).get().then(function(d){ var role=d.exists?(d.data().role||'view'):'view'; IS_ADMIN=false; CAN_EDIT=(role==='edit'); afterAuth(); })
    .catch(function(){ IS_ADMIN=false; CAN_EDIT=false; afterAuth(); });
}
function afterAuth(){ hideGate(); document.body.classList.toggle('viewonly', !CAN_EDIT); if(!_dataStarted){ _dataStarted=true; startData(); } else render(); }
function startData(){
  FB.db.collection('appdata').doc('shared').onSnapshot(function(snap){
    if(snap.exists){ try{ DB=JSON.parse(snap.data().json); }catch(e){ if(!DB||!DB.orgs) DB=seed(); } }
    else { if(!DB||!DB.orgs) DB=seed(); }
    if(!_firstSnap){ _firstSnap=true; render(); }
    else if(state.view!=='module'){ render(); }
  }, function(err){ console.warn('snapshot error',err); if(!DB||!DB.orgs){ DB=load(); render(); } });
}
function fbLogout(){ try{ if(FB&&FB.auth) FB.auth.signOut(); }catch(e){} location.reload(); }

function showGate(){
  if(document.getElementById('gate')) return;
  var g=document.createElement('div'); g.id='gate'; g.className='gate';
  g.innerHTML='<div class="gatebox"><div class="gatetitle">活動強力助手2026</div><div class="gatesub">請選擇進入方式</div>'
   +'<button class="btn pri gatebtn" onclick="googleLogin()">使用 Google 登入（編輯／管理）</button>'
   +'<div class="gateor">— 或 —</div>'
   +'<div class="gatepw"><input id="gatePw" type="password" placeholder="輸入觀看密碼" onkeydown="if(event.key===\'Enter\')enterViewer()"><button class="btn" onclick="enterViewer()">進入觀看</button></div>'
   +'<div id="gateErr" class="gateerr"></div></div>';
  document.body.appendChild(g);
}
function hideGate(){ var g=document.getElementById('gate'); if(g) g.remove(); }
function renderAuthBox(){
  var b=document.getElementById('authBox'); if(!b) return;
  if(!FB){ b.innerHTML=''; return; }
  var label = CAN_EDIT ? (IS_ADMIN?'👑 管理員':'✏️ 可編輯') : '👁 觀看';
  var admin = IS_ADMIN ? '<button onclick="openAccessAdmin()">授權</button>' : '';
  b.innerHTML='<span class="meinfo">'+label+'</span>'+admin+'<button onclick="fbLogout()">登出</button>';
}

/* 管理員：授權名單（加 email、設可編輯/只看） */
function openAccessAdmin(){
  if(!IS_ADMIN||!FB) return;
  FB.db.collection('access').get().then(function(qs){
    var rows=''; qs.forEach(function(d){ rows+=accRow(d.id,(d.data().role||'view')); });
    modal('<h3 style="margin:0 0 8px">授權名單</h3>'
      +'<p class="hint" style="margin:0 0 12px">加入別人的 Google email，設定「可編輯」或「只看」。你（'+esc(ADMIN_EMAIL)+'）永遠是管理員。</p>'
      +'<div id="accList">'+(rows||'<p class="hint">目前沒有其他授權者</p>')+'</div><div class="sep"></div>'
      +'<div class="row" style="gap:6px"><input id="accEmail" placeholder="對方的 Google email" style="flex:1"><select id="accRole" style="width:auto"><option value="edit">可編輯</option><option value="view">只看</option></select><button class="btn pri" onclick="accAdd()">加入</button></div>');
  });
}
function accRow(email,role){ return '<div class="row" style="justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line)"><span style="word-break:break-all">'+esc(email)+'</span><span class="row" style="gap:6px;flex:none"><select onchange="accSet(\''+esc(email)+'\',this.value)" style="width:auto"><option value="edit"'+(role==='edit'?' selected':'')+'>可編輯</option><option value="view"'+(role==='view'?' selected':'')+'>只看</option></select><button class="btn sm" style="color:#e24b4a;flex:none" onclick="accDel(\''+esc(email)+'\')">移除</button></span></div>'; }
function accAdd(){ var e=(document.getElementById('accEmail').value||'').trim().toLowerCase(); var r=document.getElementById('accRole').value; if(!e||e.indexOf('@')<0){ alert('請輸入正確的 Google email'); return; } FB.db.collection('access').doc(e).set({role:r}).then(function(){ toast('已加入 '+e); openAccessAdmin(); }).catch(function(x){ alert('失敗：'+x.message); }); }
function accSet(email,role){ FB.db.collection('access').doc(email).set({role:role}).then(function(){ toast('已更新 '+email); }); }
function accDel(email){ if(!confirm('移除 '+email+'？')) return; FB.db.collection('access').doc(email).delete().then(function(){ toast('已移除'); openAccessAdmin(); }); }

boot();
</script>
